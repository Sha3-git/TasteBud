<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TasteBud | Email Verification</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #ffffff;
      min-height: 100vh;
    }

    .verification-card {
      max-width: 500px;
      border: 1px solid #e9ecef;
      border-radius: 12px;
    }

    .brand {
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      border-radius: 8px;
      padding: 10px;
      font-weight: 500;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center">

  <div class="container d-flex justify-content-center">
    <div class="card verification-card shadow-sm p-4 text-center">
      <div class="brand mb-3">
        TasteBud
      </div>
      <h4 class="mb-3 text-success">Email Verified </h4>
      <p class="text-muted">
        Your email has been successfully verified.
        You can now log in to your TasteBud account.
      </p>
    </div>
  </div>

</body>
</html>
